<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Terraform S3 Demo</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .tag {
      margin-top: 20px;
      display: inline-block;
      padding: 8px 16px;
      border-radius: 50px;
      background: #ffcc00;
      color: #000;
      font-weight: bold;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🚀 Deployed with Terraform</h1>
    <p>This file is uploaded to AWS S3 using Terraform</p>

    <div class="tag">S3 + IaC + DevOps</div>

    <div class="footer">
      Created by <strong>Sayan Ray</strong>
    </div>
  </div>

</body>
</html>
